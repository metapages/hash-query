# https://docs.github.com/en/free-pro-team@latest/actions/reference/workflow-syntax-for-github-actions
name: NPM publish

# https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions
on:
  push:
    branches:
      - "main"

jobs:
  deploy:
    name: npm publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC
      contents: write # Required for tags and releases
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
        with:
          fetch-depth: "0"

      - name: Configure git for tagging
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.5.6

      - uses: extractions/setup-just@v3
        with:
          just-version: '1.25.2'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          registry-url: "https://registry.npmjs.org"

      - name: Install dependencies
        run: npm ci

      - name: publish module
        id: publish
        run: |
          # Capture version before publishing
          VERSION=$(cat package.json | jq -r '.version')
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          # Run publish and capture if it actually published
          OUTPUT=$(just publish 2>&1) || true
          echo "$OUTPUT"

          # Check if version was actually published (not skipped)
          if echo "$OUTPUT" | grep -q "PUBLISHING npm version"; then
            echo "published=true" >> $GITHUB_OUTPUT
          else
            echo "published=false" >> $GITHUB_OUTPUT
          fi

      - name: Create GitHub Release
        if: steps.publish.outputs.published == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ steps.publish.outputs.version }}"
          gh release create "v$VERSION" \
            --title "v$VERSION" \
            --generate-notes \
            --verify-tag
